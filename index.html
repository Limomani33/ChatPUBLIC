<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Soapy Chat</title>

<style>
html,body{
  height:100%;margin:0;font-family:system-ui;
  background:radial-gradient(circle at top,#ff5ad6,#502070,#0b0314);
  color:white;
}
#app{
  width:720px;height:90vh;margin:20px auto;
  background:rgba(8,8,20,.92);
  border-radius:14px;box-shadow:0 0 50px #ff5ad688;
  padding:10px;display:flex;flex-direction:column;gap:10px;
}
#topbar{font-size:20px;font-weight:bold;}
#chat{
  flex:1;overflow-y:auto;padding:12px;
  background:rgba(0,0,0,.2);border-radius:10px;
}
.msg{margin-bottom:10px}
.name{color:#ff90ff;font-weight:bold}
.name.server{color:#00ff88;font-weight:bold}
.fail-msg{color:#ff4444;font-size:14px;margin-top:2px;line-height:1.6}
.fail-msg a{color:#ff9944;font-weight:bold;text-decoration:underline;cursor:pointer}
input,button{
  background:#1a0f2a;border:1px solid #ff5ad688;
  color:white;padding:8px;border-radius:8px;
}
button{
  background:linear-gradient(135deg,#ff5ad6,#7a3cff);
  cursor:pointer;
}
button.icon{width:40px;height:40px;padding:0;font-size:18px}

/* SoapySounds Window */
#soundWindow{
  position:absolute;top:120px;left:120px;
  width:300px;background:#0e0620;
  border-radius:10px;box-shadow:0 0 30px #ff5ad699;
  display:none;flex-direction:column;
}
#soundTitle{
  background:#2a1040;
  padding:6px 10px;
  cursor:move;
  display:flex;justify-content:space-between;
  border-radius:10px 10px 0 0;
}
#soundContent{padding:10px}
.close{cursor:pointer;font-weight:bold}
</style>
</head>

<body>
<div id="app">
  <div id="topbar">Connection: ✅</div>

  <div>
    <button class="icon" onclick="openSoundWindow()">🔊</button>
    <button class="icon" onclick="pickImage()">🖼️</button>
    <input id="name" placeholder="Name">
    <input id="text" placeholder="Message">
    <button onclick="trySend()">Send</button>
    <input id="img" type="file" accept="image/*" hidden>
  </div>

  <div id="chat"></div>
</div>

<!-- SoapySounds -->
<div id="soundWindow">
  <div id="soundTitle">
    <span>SoapySounds</span>
    <span class="close" onclick="closeSoundWindow()">✖</span>
  </div>
  <div id="soundContent">
    <input type="file" id="audioFile" accept="audio/*"><br><br>
    <audio id="audioPlayer" controls style="width:100%"></audio><br><br>
    <button onclick="trySend()">Send Audio</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const NEW_URL = "https://soupychat.onrender.com";

/* ── fake connect so status shows online ── */
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("topbar").textContent = "Connection: ✅";
});

/* ── intercept every send attempt ── */
function trySend() {
  showFailMessage();
}

function showFailMessage() {
  const d = document.createElement("div");
  d.className = "msg";
  d.innerHTML =
    `<span class="name server">SERVER.SCS</span><br>` +
    `<span class="fail-msg">` +
    `Failed to send message! Soapychat is no longer being used. ` +
    `Please go to: <a href="${NEW_URL}" target="_blank">${NEW_URL}</a> ` +
    `to be able to talk and have access to new features.` +
    `</span>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

/* ── image picker also triggers fail ── */
function pickImage() {
  showFailMessage();
}

/* ── SoapySounds drag ── */
const soundWindow = document.getElementById("soundWindow");
const soundTitle  = document.getElementById("soundTitle");
let drag = false, dx = 0, dy = 0;

function openSoundWindow()  { soundWindow.style.display = "flex"; }
function closeSoundWindow() { soundWindow.style.display = "none"; }

soundTitle.onmousedown = e => { drag = true; dx = e.offsetX; dy = e.offsetY; };
document.onmousemove   = e => {
  if (!drag) return;
  soundWindow.style.left = (e.pageX - dx) + "px";
  soundWindow.style.top  = (e.pageY - dy) + "px";
};
document.onmouseup = () => drag = false;
</script>
</body>
</html>
